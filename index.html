<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Hypertrophy Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0D9488;
            --primary-dark: #0f766e;
            --primary-light: #5eead4;
            --bg-dark: #0c0c0c;
            --bg-card: #1a1a1a;
            --bg-elevated: #242424;
            --text-primary: #fafafa;
            --text-secondary: #a3a3a3;
            --accent-orange: #f97316;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
        }
        
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .gradient-text {
            background: linear-gradient(135deg, var(--primary-light), var(--primary), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
        .card-static:hover { transform: none; }
        
        .superset-card {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.08), rgba(13, 148, 136, 0.08));
            border: 2px solid rgba(168, 85, 247, 0.3);
        }
        
        .timer-progress-bar { transition: width 0.5s linear; }
        .strikethrough { text-decoration: line-through; opacity: 0.4; }
        
        .tab-btn {
            transition: all 0.2s ease-in-out;
            position: relative;
        }
        
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        
        .tab-btn.active-tab::after { width: 100%; }
        .active-tab { color: var(--primary-light) !important; }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(13, 148, 136, 0.3);
        }
        
        .btn-generate {
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
            position: relative;
            overflow: hidden;
        }
        
        .btn-generate::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-generate:hover::before { left: 100%; }
        
        .btn-success {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--accent-red), #dc2626);
        }
        
        input[type="checkbox"] { accent-color: var(--primary); }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary-light);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
        }
        
        .stat-box {
            background: var(--bg-elevated);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        
        .nav-tab {
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }
        
        .nav-tab.active {
            border-bottom-color: var(--primary);
            color: var(--primary-light);
        }
        
        .saved-workout-card {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .saved-workout-card:hover {
            border-color: var(--primary);
        }
        
        .saved-workout-card.selected {
            border-color: var(--primary);
            background: rgba(13, 148, 136, 0.1);
        }
        
        .progress-bar-bg {
            background: var(--bg-elevated);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            background: linear-gradient(90deg, var(--primary), var(--accent-purple));
            height: 100%;
            transition: width 0.3s ease;
        }
        
        .weight-input {
            background: var(--bg-elevated);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 6px 10px;
            width: 80px;
            color: white;
            text-align: center;
        }
        
        .weight-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .modal-overlay {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(4px);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
    </style>
</head>
<body>
    <!-- Timer Modal -->
    <div id="timer-modal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="card p-8 text-center w-80 sm:w-96">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gradient-to-br from-teal-500/20 to-purple-500/20 flex items-center justify-center">
                <svg class="w-8 h-8 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-teal-400 mb-2">REST TIME</h2>
            <p id="timer-display" class="mono text-7xl font-bold gradient-text mb-6">60</p>
            <div class="w-full bg-neutral-800 rounded-full h-2 overflow-hidden">
                <div id="timer-progress" class="bg-gradient-to-r from-teal-500 to-purple-500 h-2 rounded-full timer-progress-bar" style="width: 100%;"></div>
            </div>
            <button id="close-timer-btn" class="mt-8 bg-neutral-700 text-white font-semibold py-3 px-6 rounded-xl hover:bg-neutral-600 transition-colors w-full">SKIP</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="card p-6 sm:p-8 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold gradient-text">Generation Settings</h2>
                <button id="close-settings-btn" class="text-neutral-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-2">Workout Name</label>
                    <input type="text" id="workout-name" placeholder="e.g., Week 1 - Strength Focus" class="w-full bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-2">Focus Area</label>
                    <select id="focus-area" class="w-full bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500">
                        <option value="">Balanced (Default)</option>
                        <option value="chest">Emphasize Chest</option>
                        <option value="back">Emphasize Back</option>
                        <option value="shoulders">Emphasize Shoulders</option>
                        <option value="arms">Emphasize Arms</option>
                        <option value="legs">Emphasize Legs</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-2">Max Duration</label>
                    <select id="max-duration" class="w-full bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500">
                        <option value="35">35 minutes</option>
                        <option value="40">40 minutes</option>
                        <option value="45" selected>45 minutes</option>
                        <option value="50">50 minutes</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-2">Equipment</label>
                    <select id="equipment-pref" class="w-full bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500">
                        <option value="full">Full Gym</option>
                        <option value="barbell">Barbell Focus</option>
                        <option value="dumbbell">Dumbbell Focus</option>
                        <option value="cables">Cables & Machines</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-2">Intensity Technique</label>
                    <select id="intensity-technique" class="w-full bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500">
                        <option value="standard">Standard Sets</option>
                        <option value="dropsets">Include Drop Sets</option>
                        <option value="restpause">Include Rest-Pause</option>
                        <option value="tempo">Tempo Training</option>
                        <option value="mixed">Mixed Techniques</option>
                    </select>
                </div>
                
                <button id="generate-with-settings" class="btn-generate w-full text-white font-bold py-4 px-6 rounded-xl transition-all">
                    Generate New Workout
                </button>

                <button id="reset-data-btn" class="w-full text-neutral-500 hover:text-red-400 text-sm font-medium py-2 transition-colors">
                    Reset all data &amp; history
                </button>
            </div>
        </div>
    </div>

    <!-- Log Workout Modal -->
    <div id="log-modal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="card p-6 sm:p-8 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold gradient-text">Log Workout</h2>
                <button id="close-log-btn" class="text-neutral-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div id="log-exercises-container" class="space-y-4 mb-6">
                <!-- Exercise logging fields will be rendered here -->
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-neutral-400 mb-2">Session Notes (Optional)</label>
                    <textarea id="session-notes" rows="3" placeholder="How did you feel? Any adjustments made?" class="w-full bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500 resize-none"></textarea>
                </div>
                
                <div class="flex gap-3">
                    <button id="save-log-btn" class="btn-success flex-1 text-white font-bold py-3 px-6 rounded-xl transition-all">
                        Save Workout Log
                    </button>
                    <button id="cancel-log-btn" class="bg-neutral-700 text-white font-semibold py-3 px-6 rounded-xl hover:bg-neutral-600 transition-colors">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- View Progress Modal -->
    <div id="progress-modal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="card p-6 sm:p-8 w-full max-w-3xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold gradient-text">Progress History</h2>
                <button id="close-progress-btn" class="text-neutral-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div id="progress-content" class="space-y-6">
                <!-- Progress data will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Saved Workouts Modal -->
    <div id="saved-modal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="card p-6 sm:p-8 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold gradient-text">Saved Workouts</h2>
                <button id="close-saved-btn" class="text-neutral-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div id="saved-workouts-list" class="space-y-3">
                <!-- Saved workouts will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container mx-auto max-w-5xl p-4 sm:p-6 lg:p-8">
        <!-- Header -->
        <header class="mb-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-bold gradient-text tracking-tight">Adaptive Hypertrophy Coach</h1>
                    <p class="text-neutral-400 text-sm mt-1">Progressive 4-day split • Track your gains</p>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button id="saved-btn" class="bg-neutral-800 text-white font-medium py-2 px-3 rounded-lg hover:bg-neutral-700 transition-colors flex items-center gap-1.5 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
                        </svg>
                        Saved
                    </button>
                    <button id="progress-btn" class="bg-neutral-800 text-white font-medium py-2 px-3 rounded-lg hover:bg-neutral-700 transition-colors flex items-center gap-1.5 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        Progress
                    </button>
                    <button id="settings-btn" class="bg-neutral-800 text-white font-medium py-2 px-3 rounded-lg hover:bg-neutral-700 transition-colors flex items-center gap-1.5 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                        </svg>
                        New
                    </button>
                </div>
            </div>
            
            <!-- Current Workout Info -->
            <div id="current-workout-info" class="card card-static p-4 mb-4">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                    <div>
                        <p class="text-xs text-neutral-500 uppercase tracking-wider">Current Workout</p>
                        <h2 id="current-workout-name" class="text-lg font-bold text-white">Week 1 - Hypertrophy Base</h2>
                    </div>
                    <div class="flex gap-2">
                        <button id="log-workout-btn" class="btn-success text-white font-semibold py-2 px-4 rounded-lg text-sm flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            Log Session
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Stats Grid -->
            <div class="stats-grid mb-4">
                <div class="stat-box">
                    <p class="text-xs text-neutral-500 uppercase tracking-wider mb-1">Week</p>
                    <p id="week-number" class="mono text-xl font-bold text-teal-400">1</p>
                </div>
                <div class="stat-box">
                    <p class="text-xs text-neutral-500 uppercase tracking-wider mb-1">Logged</p>
                    <p id="logged-sessions" class="mono text-xl font-bold text-purple-400">0</p>
                </div>
                <div class="stat-box">
                    <p class="text-xs text-neutral-500 uppercase tracking-wider mb-1">Total Vol</p>
                    <p id="total-volume" class="mono text-xl font-bold text-orange-400">0</p>
                </div>
                <div class="stat-box">
                    <p class="text-xs text-neutral-500 uppercase tracking-wider mb-1">Streak</p>
                    <p id="workout-streak" class="mono text-xl font-bold text-green-400">0</p>
                </div>
            </div>
            
            <!-- Day Navigation -->
            <div id="day-navigation" class="flex flex-wrap justify-center gap-2 border-b border-neutral-800 pb-3">
                <!-- Tabs generated dynamically -->
            </div>
            
            <!-- Day Title -->
            <div class="text-center mt-4">
                <h2 id="workout-day-title" class="text-xl sm:text-2xl font-bold text-white"></h2>
                <p id="workout-day-details" class="text-neutral-400 mt-1 text-sm"></p>
            </div>
        </header>

        <!-- Workout Container -->
        <main id="workout-container" class="space-y-4 fade-in">
            <!-- Exercise cards rendered here -->
        </main>
        
        <!-- Progression Notes -->
        <section id="progression-notes" class="mt-8 card card-static p-5 hidden">
            <h3 class="text-base font-bold text-teal-400 mb-2 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
                Progression Notes
            </h3>
            <p id="progression-text" class="text-neutral-300 text-sm leading-relaxed"></p>
        </section>
    </div>

    <script>

                    { name: 'Leg Press Calf Raises', equipment: 'machine', focus: 'Use leg press machine for calf raises. Great for heavy loading.', alternative: 'Standing Calf Raises' }
                ]
            }
        };

        // ============================================
        // STATE MANAGEMENT
        // ============================================
        let appState = {
            weekNumber: 1,
            currentWorkout: null,
            currentWorkoutId: null,
            savedWorkouts: [],
            workoutLogs: [],
            exerciseProgress: {},
            settings: {
                focusArea: '',
                maxDuration: 45,
                equipmentPref: 'full',
                intensityTechnique: 'standard'
            }
        };

        function loadState() {
            const saved = localStorage.getItem('hypertrophyCoachState_v2');
            if (saved) {
                try {
                    appState = { ...appState, ...JSON.parse(saved) };
                } catch (e) {
                    console.log('Could not load saved state');
                }
            }
        }

        function saveState() {
            localStorage.setItem('hypertrophyCoachState_v2', JSON.stringify(appState));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // ============================================
        // WORKOUT GENERATION
        // ============================================
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function shuffleArray(arr) {
            const newArr = [...arr];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function filterByEquipment(exercises, pref) {
            if (pref === 'full') return exercises;
            const filtered = exercises.filter(ex => {
                if (pref === 'barbell') return ex.equipment === 'barbell' || ex.equipment === 'bodyweight';
                if (pref === 'dumbbell') return ex.equipment === 'dumbbell' || ex.equipment === 'bodyweight';
                if (pref === 'cables') return ex.equipment === 'cable' || ex.equipment === 'machine';
                return true;
            });
            return filtered.length > 0 ? filtered : exercises;
        }

        function getRepScheme(isCompound, weekNum) {
            const schemes = {
                compound: [
                    { sets: 3, reps: '6-10' },
                    { sets: 4, reps: '8-10' },
                    { sets: 3, reps: '8-12' },
                    { sets: 4, reps: '6-8' }
                ],
                isolation: [
                    { sets: 3, reps: '10-15' },
                    { sets: 2, reps: '12-15' },
                    { sets: 3, reps: '12-15' },
                    { sets: 2, reps: '15-20' }
                ]
            };
            const pool = isCompound ? schemes.compound : schemes.isolation;
            return pool[(weekNum - 1) % pool.length];
        }

        function applyIntensityTechnique(exercise, technique) {
            if (technique === 'standard') return exercise;
            const techniques = {
                dropsets: 'Last set is a double drop set.',
                restpause: 'Use rest-pause on final set.',
                tempo: 'Use 3-1-2-0 tempo.',
                mixed: ''
            };
            let techNote = techniques[technique];
            if (technique === 'mixed') {
                techNote = getRandomItem(['Last set drop set.', 'Rest-pause final set.', '3 sec negative.']);
            }
            return { ...exercise, focus: exercise.focus + ' ' + techNote };
        }

        function generateDay(dayType, weekNum, settings) {
            const { equipmentPref, intensityTechnique, focusArea } = settings;
            let exercises = [];
            
            switch (dayType) {
                case 'upper': {
                    const chestCompound = filterByEquipment(ExerciseDatabase.chest.compound, equipmentPref);
                    const backCompound = filterByEquipment(ExerciseDatabase.back.compound, equipmentPref);
                    const shoulderCompound = filterByEquipment(ExerciseDatabase.shoulders.compound, equipmentPref);
                    
                    exercises.push({ ...applyIntensityTechnique(getRandomItem(shuffleArray(chestCompound)), intensityTechnique), ...getRepScheme(true, weekNum), rest: 60 });
                    exercises.push({ ...applyIntensityTechnique(getRandomItem(shuffleArray(backCompound)), intensityTechnique), ...getRepScheme(true, weekNum), rest: 60 });
                    exercises.push({ ...getRandomItem(shuffleArray(shoulderCompound)), ...getRepScheme(true, weekNum), rest: 60 });
                    
                    const back2 = getRandomItem(shuffleArray(backCompound));
                    exercises.push({ ...back2, ...getRepScheme(true, weekNum), rest: 60 });
                    
                    exercises.push({
                        type: 'superset',
                        supersetLabel: 'Triceps & Biceps Superset',
                        rest: 60,
                        estimatedDuration: '~7-9 minutes',
                        exercises: [
                            { ...getRandomItem(filterByEquipment(ExerciseDatabase.triceps.exercises, equipmentPref)), ...getRepScheme(false, weekNum) },
                            { ...getRandomItem(filterByEquipment(ExerciseDatabase.biceps.exercises, equipmentPref)), ...getRepScheme(false, weekNum) }
                        ]
                    });
                    break;
                }
                case 'lower': {
                    const quadCompound = filterByEquipment(ExerciseDatabase.quads.compound, equipmentPref);
                    const hamCompound = filterByEquipment(ExerciseDatabase.hamstrings.compound, equipmentPref);
                    
                    exercises.push({ ...applyIntensityTechnique(getRandomItem(shuffleArray(quadCompound)), intensityTechnique), sets: 3, reps: focusArea === 'legs' ? '6-10' : '8-12', rest: 90 });
                    exercises.push({ ...getRandomItem(shuffleArray(hamCompound)), ...getRepScheme(true, weekNum), rest: 60 });
                    
                    const unilateral = shuffleArray(quadCompound).find(e => e.name.includes('Lunge') || e.name.includes('Split') || e.name.includes('Bulgarian')) || quadCompound[0];
                    exercises.push({ ...unilateral, sets: 2, reps: '10-12 per leg', rest: 45 });
                    
                    exercises.push({
                        type: 'superset',
                        supersetLabel: 'Quads & Hamstrings Superset',
                        rest: 60,
                        estimatedDuration: '~6-8 minutes',
                        exercises: [
                            { ...getRandomItem(ExerciseDatabase.quads.isolation), sets: 2, reps: '12-15' },
                            { ...getRandomItem(ExerciseDatabase.hamstrings.isolation), sets: 2, reps: '12-15' }
                        ]
                    });
                    
                    const calfEx = shuffleArray(ExerciseDatabase.calves.exercises);
                    exercises.push({
                        type: 'superset',
                        supersetLabel: 'Calves Superset',
                        rest: 60,
                        estimatedDuration: '~5-7 minutes',
                        exercises: [
                            { ...calfEx[0], sets: 2, reps: '12-15' },
                            { ...(calfEx[1] || calfEx[0]), sets: 2, reps: '15-20' }
                        ]
                    });
                    break;
                }
                case 'push': {
                    const chestCompound = filterByEquipment(ExerciseDatabase.chest.compound, equipmentPref);
                    const shoulderCompound = filterByEquipment(ExerciseDatabase.shoulders.compound, equipmentPref);
                    const chestIso = filterByEquipment(ExerciseDatabase.chest.isolation, equipmentPref);
                    const shoulderIso = filterByEquipment(ExerciseDatabase.shoulders.isolation, equipmentPref);
                    
                    exercises.push({ ...applyIntensityTechnique(getRandomItem(shuffleArray(chestCompound)), intensityTechnique), sets: focusArea === 'chest' ? 4 : 3, reps: '8-12', rest: 60 });
                    exercises.push({ ...getRandomItem(shuffleArray(shoulderCompound)), sets: 3, reps: '8-12', rest: 60 });
                    exercises.push({ ...getRandomItem(shuffleArray(chestIso)), sets: 2, reps: '10-15', rest: 45 });
                    
                    exercises.push({
                        type: 'superset',
                        supersetLabel: 'Triceps & Shoulders Superset',
                        rest: 60,
                        estimatedDuration: '~7-9 minutes',
                        exercises: [
                            { ...getRandomItem(filterByEquipment(ExerciseDatabase.triceps.exercises, equipmentPref)), sets: focusArea === 'arms' ? 3 : 2, reps: '10-15' },
                            { ...getRandomItem(shuffleArray(shoulderIso)), sets: 2, reps: '12-15' }
                        ]
                    });
                    break;
                }
                case 'pull': {
                    const backCompound = filterByEquipment(ExerciseDatabase.back.compound, equipmentPref);
                    const backIso = filterByEquipment(ExerciseDatabase.back.isolation, equipmentPref);
                    const bicepPool = shuffleArray(filterByEquipment(ExerciseDatabase.biceps.exercises, equipmentPref));
                    
                    const vertical = shuffleArray(backCompound).find(e => e.name.includes('Pulldown') || e.name.includes('Pull-up')) || backCompound[0];
                    exercises.push({ ...applyIntensityTechnique(vertical, intensityTechnique), sets: focusArea === 'back' ? 4 : 3, reps: '8-12', rest: 45 });
                    
                    const horizontal = shuffleArray(backCompound).find(e => e.name.includes('Row')) || backCompound[1];
                    exercises.push({ ...horizontal, sets: focusArea === 'back' ? 4 : 3, reps: '10-15', rest: 45 });
                    exercises.push({ ...getRandomItem(shuffleArray(backIso)), sets: 3, reps: '15-20', rest: 45 });
                    
                    exercises.push({
                        type: 'superset',
                        supersetLabel: 'Biceps Superset',
                        rest: 60,
                        estimatedDuration: '~7-9 minutes',
                        exercises: [
                            { ...bicepPool[0], sets: focusArea === 'arms' ? 3 : 2, reps: '10-15' },
                            { ...(bicepPool[1] || bicepPool[0]), sets: focusArea === 'arms' ? 3 : 2, reps: '10-15' }
                        ]
                    });
                    break;
                }
            }
            
            const estMin = 35 + Math.floor(Math.random() * 10);
            return { exercises, estimatedDuration: `~${estMin}-${estMin + 5} minutes` };
        }

        /** @deprecated kept only for the very first run if no API URL is set */
        function generateWeeklyWorkout(name, settings) {
            const weekNum = appState.weekNumber;
            const emphasisCycle = [
                { upper: 'Chest Strength & Back Density', lower: 'Quad & Hamstring Balance', push: 'Upper Chest & Shoulder Width', pull: 'Back Thickness & Bicep Development' },
                { upper: 'Horizontal Pressing & Rowing', lower: 'Glute & Hamstring Focus', push: 'Shoulder Roundness & Triceps', pull: 'Back Width & Bicep Peak' },
                { upper: 'Chest Thickness & Back Width', lower: 'Quad Sweep & Calf Size', push: 'Pressing Power & Delt Detail', pull: 'Lat Development & Arm Size' }
            ];
            const emphases = emphasisCycle[(weekNum - 1) % emphasisCycle.length];
            
            const workout = [
                { dayName: 'Monday', title: 'Upper Body', emphasis: emphases.upper, ...generateDay('upper', weekNum, settings) },
                { dayName: 'Tuesday', title: 'Lower Body', emphasis: emphases.lower, ...generateDay('lower', weekNum, settings) },
                { dayName: 'Thursday', title: 'Push Day', emphasis: emphases.push, ...generateDay('push', weekNum, settings) },
                { dayName: 'Friday', title: 'Pull Day', emphasis: emphases.pull, ...generateDay('pull', weekNum, settings) }
            ];
            
            const progressionNotes = `Week ${weekNum} workout with ${settings.intensityTechnique === 'standard' ? 'standard sets' : settings.intensityTechnique + ' technique'}. ${settings.focusArea ? 'Emphasis on ' + settings.focusArea + '.' : 'Balanced approach.'} All sessions optimized for ${settings.maxDuration} minute max.`;
            
            return {
                id: generateId(),
                name: name || `Week ${weekNum} - ${new Date().toLocaleDateString()}`,
                createdAt: new Date().toISOString(),
                weekNumber: weekNum,
                settings: { ...settings },
                workout,
                progressionNotes
            };
        }

        // ============================================
        // UI RENDERING
        // ============================================
        let currentDayIndex = 0;
        let multiDayWorkoutData = [];
        let timerInterval;

        const workoutContainer = document.getElementById('workout-container');
        const dayNavigationContainer = document.getElementById('day-navigation');
        const workoutDayTitleEl = document.getElementById('workout-day-title');
        const workoutDayDetailsEl = document.getElementById('workout-day-details');
        const timerModal = document.getElementById('timer-modal');
        const timerDisplay = document.getElementById('timer-display');
        const timerProgress = document.getElementById('timer-progress');
        const closeTimerBtn = document.getElementById('close-timer-btn');
        const settingsModal = document.getElementById('settings-modal');
        const logModal = document.getElementById('log-modal');
        const progressModal = document.getElementById('progress-modal');
        const savedModal = document.getElementById('saved-modal');
        const currentWorkoutNameEl = document.getElementById('current-workout-name');
        const weekNumberEl = document.getElementById('week-number');
        const loggedSessionsEl = document.getElementById('logged-sessions');
        const totalVolumeEl = document.getElementById('total-volume');
        const workoutStreakEl = document.getElementById('workout-streak');
        const progressionNotesSection = document.getElementById('progression-notes');
        const progressionTextEl = document.getElementById('progression-text');

        function createExerciseCard(exercise, exerciseIndex, dayIndex, isSupersetChild = false, supersetIndex = null) {
            const card = document.createElement('div');
            card.className = `card card-static p-4 sm:p-5 fade-in ${isSupersetChild ? 'mb-3 last:mb-0 bg-neutral-900/50' : ''}`;
            
            let setsCheckboxes = '';
            for (let i = 1; i <= exercise.sets; i++) {
                const checkboxId = `day${dayIndex}_ex${exerciseIndex}${supersetIndex !== null ? `_ss${supersetIndex}` : ''}_set${i}`;
                setsCheckboxes += `
                    <div class="flex items-center">
                        <input type="checkbox" id="${checkboxId}" class="h-4 w-4 rounded bg-neutral-700 border-neutral-600 focus:ring-teal-500">
                        <label for="${checkboxId}" class="ml-1.5 text-neutral-400 text-sm">Set ${i}</label>
                    </div>
                `;
            }
            
            const titleId = `ex-title-day${dayIndex}-ex${exerciseIndex}${supersetIndex !== null ? `-ss${supersetIndex}` : ''}`;
            const focusId = `ex-focus-day${dayIndex}-ex${exerciseIndex}${supersetIndex !== null ? `-ss${supersetIndex}` : ''}`;
            const toggleAltId = `toggle-alt-day${dayIndex}-ex${exerciseIndex}${supersetIndex !== null ? `-ss${supersetIndex}` : ''}`;

            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <h3 id="${titleId}" class="text-lg sm:text-xl font-bold text-white">${exercise.name}</h3>
                        ${exercise.alternative ? `<button id="${toggleAltId}" data-original-name="${exercise.name}" data-alt-name="${exercise.alternative}" class="text-xs text-teal-400 hover:text-teal-300 font-medium mt-0.5 flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                            Alt: ${exercise.alternative}
                        </button>` : ''}
                    </div>
                    ${exercise.focus ? `<button class="info-toggle text-neutral-500 hover:text-teal-400 transition-colors flex-shrink-0 ml-2" data-focus-id="${focusId}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </button>` : ''}
                </div>
                ${exercise.focus ? `<div id="${focusId}" class="mt-2 text-neutral-300 bg-neutral-800/50 p-3 rounded-lg text-xs hidden border border-neutral-700">
                    <span class="text-teal-400 font-semibold">Focus:</span> ${exercise.focus}
                </div>` : ''}
                <div class="mt-3 sm:mt-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 sm:gap-3">
                    <div class="text-center bg-neutral-800/70 p-2 rounded-lg min-w-[90px]">
                        <p class="text-xs font-bold text-neutral-500 uppercase">Sets×Reps</p>
                        <p class="mono text-base font-semibold text-white">${exercise.sets}×${exercise.reps}</p>
                    </div>
                    <div class="flex-grow flex items-center justify-center gap-2 sm:gap-3">
                        ${setsCheckboxes}
                    </div>
                    ${!isSupersetChild && exercise.rest ? `
                    <button class="rest-timer-btn btn-primary text-white font-semibold py-2 px-4 rounded-lg text-sm" data-time="${exercise.rest}">
                        Rest ${exercise.rest}s
                    </button>` : ''}
                </div>
            `;
            return card;
        }

        function createSupersetCard(superset, supersetIndex, dayIndex) {
            const supersetContainer = document.createElement('div');
            supersetContainer.className = 'superset-card rounded-xl p-4 sm:p-5 fade-in';
            
            let supersetExercisesHTML = `
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-7 h-7 rounded-lg bg-purple-500/20 flex items-center justify-center">
                        <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <h2 class="text-lg sm:text-xl font-bold text-purple-300">${superset.supersetLabel || 'Superset'}</h2>
                    ${superset.estimatedDuration ? `<span class="ml-auto text-xs text-neutral-500 mono">${superset.estimatedDuration}</span>` : ''}
                </div>
            `;
            superset.exercises.forEach((exercise, exerciseIdx) => {
                const exerciseCard = createExerciseCard(exercise, exerciseIdx, dayIndex, true, supersetIndex);
                supersetExercisesHTML += exerciseCard.outerHTML;
            });

            supersetContainer.innerHTML = `
                ${supersetExercisesHTML}
                <div class="mt-3 sm:mt-4 flex justify-end">
                    <button class="rest-timer-btn btn-primary text-white font-semibold py-2 px-4 rounded-lg text-sm" data-time="${superset.rest}">
                        Rest Superset ${superset.rest}s
                    </button>
                </div>
            `;
            return supersetContainer;
        }

        function renderDay(dayIndex) {
            currentDayIndex = dayIndex;
            const dayData = multiDayWorkoutData[dayIndex];
            workoutContainer.innerHTML = '';
            workoutDayTitleEl.textContent = `${dayData.dayName}: ${dayData.title}`;
            workoutDayDetailsEl.textContent = `${dayData.emphasis} (${dayData.estimatedDuration})`;

            dayData.exercises.forEach((item, index) => {
                let card = item.type === 'superset' 
                    ? createSupersetCard(item, index, dayIndex)
                    : createExerciseCard(item, index, dayIndex);
                workoutContainer.appendChild(card);
            });
            
            updateActiveTab(dayIndex);
            attachEventListeners();
        }

        function attachEventListeners() {
            document.querySelectorAll('.rest-timer-btn').forEach(button => {
                button.addEventListener('click', () => startTimer(parseInt(button.dataset.time, 10)));
            });

            document.querySelectorAll('[id^="toggle-alt-"]').forEach(button => {
                button.addEventListener('click', () => {
                    const titleEl = document.getElementById(button.id.replace('toggle-alt-', 'ex-title-'));
                    const currentTitle = titleEl.textContent;
                    const originalName = button.dataset.originalName;
                    const altName = button.dataset.altName;
                    if (currentTitle === originalName) {
                        titleEl.textContent = altName;
                        button.innerHTML = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg> Alt: ${originalName}`;
                    } else {
                        titleEl.textContent = originalName;
                        button.innerHTML = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg> Alt: ${altName}`;
                    }
                });
            });

            document.querySelectorAll('.info-toggle').forEach(button => {
                button.addEventListener('click', () => {
                    const focusEl = document.getElementById(button.dataset.focusId);
                    if (focusEl) focusEl.classList.toggle('hidden');
                });
            });
            
            document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const label = e.target.nextElementSibling;
                    if (label) label.classList.toggle('strikethrough', e.target.checked);
                });
            });
        }

        function startTimer(duration) {
            clearInterval(timerInterval);
            let timeLeft = duration;
            timerModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            timerDisplay.textContent = duration;
            timerProgress.style.width = '100%';

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                timerProgress.style.width = `${(timeLeft / duration) * 100}%`;
                if (timeLeft <= 0) {
                    closeTimer();
                    try {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.frequency.value = 800;
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.3);
                    } catch (e) {}
                }
            }, 1000);
        }

        function closeTimer() {
            clearInterval(timerInterval);
            timerModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function createDayNavigation() {
            dayNavigationContainer.innerHTML = '';
            multiDayWorkoutData.forEach((day, index) => {
                const tabButton = document.createElement('button');
                tabButton.className = 'tab-btn px-3 py-2 rounded-lg text-sm font-medium text-neutral-400 hover:text-white hover:bg-neutral-800 transition-all';
                tabButton.textContent = day.dayName;
                tabButton.addEventListener('click', () => renderDay(index));
                dayNavigationContainer.appendChild(tabButton);
            });
        }

        function updateActiveTab(activeIndex) {
            dayNavigationContainer.querySelectorAll('.tab-btn').forEach((tab, index) => {
                tab.classList.toggle('active-tab', index === activeIndex);
                tab.classList.toggle('bg-neutral-800', index === activeIndex);
            });
        }

        function updateStats() {
            weekNumberEl.textContent = (appState.currentWorkout && appState.currentWorkout.weekNumber) || appState.weekNumber;
            loggedSessionsEl.textContent = appState.workoutLogs.length;
            
            const totalVol = appState.workoutLogs.reduce((sum, log) => {
                return sum + (log.exercises || []).reduce((exSum, ex) => {
                    return exSum + (ex.sets || []).reduce((setSum, set) => {
                        return setSum + ((set.weight || 0) * (set.reps || 0));
                    }, 0);
                }, 0);
            }, 0);
            totalVolumeEl.textContent = totalVol > 1000 ? `${(totalVol/1000).toFixed(1)}k` : totalVol;
            
            // Calculate streak
            let streak = 0;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const sortedLogs = [...appState.workoutLogs].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            for (let i = 0; i < sortedLogs.length; i++) {
                const logDate = new Date(sortedLogs[i].date);
                logDate.setHours(0, 0, 0, 0);
                const expectedDate = new Date(today);
                expectedDate.setDate(expectedDate.getDate() - streak);
                
                if (logDate.getTime() === expectedDate.getTime()) {
                    streak++;
                } else if (logDate < expectedDate) {
                    break;
                }
            }
            workoutStreakEl.textContent = streak;
        }

        // ============================================
        // WORKOUT LOGGING
        // ============================================
        function openLogModal() {
            const dayData = multiDayWorkoutData[currentDayIndex];
            const container = document.getElementById('log-exercises-container');
            container.innerHTML = '';
            
            const allExercises = [];
            dayData.exercises.forEach((item, idx) => {
                if (item.type === 'superset') {
                    item.exercises.forEach((ex, subIdx) => {
                        allExercises.push({ ...ex, id: `${idx}_${subIdx}` });
                    });
                } else {
                    allExercises.push({ ...item, id: `${idx}` });
                }
            });
            
            allExercises.forEach(exercise => {
                const exerciseLog = document.createElement('div');
                exerciseLog.className = 'card card-static p-4';
                
                let setsHTML = '';
                for (let i = 0; i < exercise.sets; i++) {
                    setsHTML += `
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs text-neutral-500 w-12">Set ${i + 1}</span>
                            <input type="number" placeholder="Weight" class="weight-input" data-exercise="${exercise.id}" data-set="${i}" data-field="weight">
                            <span class="text-neutral-600 text-xs">lbs ×</span>
                            <input type="number" placeholder="Reps" class="weight-input w-16" data-exercise="${exercise.id}" data-set="${i}" data-field="reps">
                        </div>
                    `;
                }
                
                exerciseLog.innerHTML = `
                    <h4 class="font-semibold text-white mb-3">${exercise.name}</h4>
                    <p class="text-xs text-neutral-500 mb-3">Target: ${exercise.sets} × ${exercise.reps}</p>
                    ${setsHTML}
                `;
                container.appendChild(exerciseLog);
            });
            
            logModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function saveWorkoutLog() {
            const dayData = multiDayWorkoutData[currentDayIndex];
            const inputs = logModal.querySelectorAll('input[data-exercise]');
            const exerciseData = {};
            
            inputs.forEach(input => {
                const exId = input.dataset.exercise;
                const setIdx = parseInt(input.dataset.set);
                const field = input.dataset.field;
                
                if (!exerciseData[exId]) exerciseData[exId] = { sets: [] };
                if (!exerciseData[exId].sets[setIdx]) exerciseData[exId].sets[setIdx] = {};
                exerciseData[exId].sets[setIdx][field] = parseFloat(input.value) || 0;
            });
            
            const allExercises = [];
            dayData.exercises.forEach((item, idx) => {
                if (item.type === 'superset') {
                    item.exercises.forEach((ex, subIdx) => {
                        const id = `${idx}_${subIdx}`;
                        allExercises.push({
                            name: ex.name,
                            sets: exerciseData[id]?.sets || []
                        });
                    });
                } else {
                    const id = `${idx}`;
                    allExercises.push({
                        name: item.name,
                        sets: exerciseData[id]?.sets || []
                    });
                }
            });
            
            const log = {
                id: generateId(),
                workoutId: appState.currentWorkoutId,
                workoutName: appState.savedWorkouts.find(w => w.id === appState.currentWorkoutId)?.name || 'Unknown',
                day: dayData.dayName,
                dayTitle: dayData.title,
                date: new Date().toISOString(),
                exercises: allExercises,
                notes: document.getElementById('session-notes').value
            };
            
            appState.workoutLogs.push(log);
            
            // Update exercise progress tracking
            allExercises.forEach(ex => {
                if (!appState.exerciseProgress[ex.name]) {
                    appState.exerciseProgress[ex.name] = [];
                }
                const maxWeight = Math.max(...ex.sets.map(s => s.weight || 0));
                const maxReps = Math.max(...ex.sets.map(s => s.reps || 0));
                if (maxWeight > 0) {
                    appState.exerciseProgress[ex.name].push({
                        date: log.date,
                        weight: maxWeight,
                        reps: maxReps
                    });
                }
            });
            
            saveState();
            updateStats();
            closeLogModal();
        }

        function closeLogModal() {
            logModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.getElementById('session-notes').value = '';
        }

        // ============================================
        // PROGRESS VIEWING
        // ============================================
        function openProgressModal() {
            const container = document.getElementById('progress-content');
            
            if (appState.workoutLogs.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10">
                        <svg class="w-16 h-16 mx-auto text-neutral-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        <p class="text-neutral-400">No workout logs yet.</p>
                        <p class="text-neutral-500 text-sm">Complete and log workouts to see your progress!</p>
                    </div>
                `;
            } else {
                // Exercise PRs
                let prsHTML = '<div class="mb-6"><h3 class="text-lg font-bold text-white mb-3">Personal Records</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-3">';
                Object.entries(appState.exerciseProgress).forEach(([name, history]) => {
                    if (history.length > 0) {
                        const maxWeight = Math.max(...history.map(h => h.weight));
                        prsHTML += `
                            <div class="bg-neutral-800 rounded-lg p-3">
                                <p class="text-sm text-white font-medium truncate">${name}</p>
                                <p class="mono text-lg text-teal-400">${maxWeight} lbs</p>
                            </div>
                        `;
                    }
                });
                prsHTML += '</div></div>';
                
                // Recent logs
                let logsHTML = '<div><h3 class="text-lg font-bold text-white mb-3">Recent Sessions</h3><div class="space-y-3">';
                const recentLogs = [...appState.workoutLogs].reverse().slice(0, 10);
                recentLogs.forEach(log => {
                    const totalVol = log.exercises.reduce((sum, ex) => {
                        return sum + ex.sets.reduce((setSum, set) => setSum + ((set.weight || 0) * (set.reps || 0)), 0);
                    }, 0);
                    
                    logsHTML += `
                        <div class="bg-neutral-800 rounded-lg p-4">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <p class="font-semibold text-white">${log.day}: ${log.dayTitle}</p>
                                    <p class="text-xs text-neutral-500">${log.workoutName}</p>
                                </div>
                                <span class="text-xs text-neutral-500">${new Date(log.date).toLocaleDateString()}</span>
                            </div>
                            <div class="flex gap-4 text-sm">
                                <span class="text-neutral-400">Exercises: <span class="text-white">${log.exercises.length}</span></span>
                                <span class="text-neutral-400">Volume: <span class="text-teal-400 mono">${totalVol.toLocaleString()} lbs</span></span>
                            </div>
                            ${log.notes ? `<p class="text-xs text-neutral-500 mt-2 italic">"${log.notes}"</p>` : ''}
                        </div>
                    `;
                });
                logsHTML += '</div></div>';
                
                container.innerHTML = prsHTML + logsHTML;
            }
            
            progressModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // ============================================
        // SAVED WORKOUTS
        // ============================================
        function openSavedModal() {
            const container = document.getElementById('saved-workouts-list');
            
            if (appState.savedWorkouts.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10">
                        <svg class="w-16 h-16 mx-auto text-neutral-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
                        </svg>
                        <p class="text-neutral-400">No saved workouts yet.</p>
                        <p class="text-neutral-500 text-sm">Generate a workout to get started!</p>
                    </div>
                `;
            } else {
                container.innerHTML = appState.savedWorkouts.map(workout => `
                    <div class="saved-workout-card card card-static p-4 ${workout.id === appState.currentWorkoutId ? 'selected' : ''}" data-workout-id="${workout.id}">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <h4 class="font-semibold text-white">${workout.name}</h4>
                                <p class="text-xs text-neutral-500 mt-1">Created: ${new Date(workout.createdAt).toLocaleDateString()}</p>
                                <div class="flex gap-3 mt-2 text-xs">
                                    <span class="text-neutral-400">Week ${workout.weekNumber}</span>
                                    ${workout.settings.focusArea ? `<span class="text-teal-400">${workout.settings.focusArea} focus</span>` : ''}
                                    <span class="text-purple-400">${workout.settings.intensityTechnique}</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button class="load-workout-btn text-teal-400 hover:text-teal-300 p-2" data-workout-id="${workout.id}" title="Load">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                                    </svg>
                                </button>
                                <button class="delete-workout-btn text-red-400 hover:text-red-300 p-2" data-workout-id="${workout.id}" title="Delete">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                container.querySelectorAll('.load-workout-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        loadWorkout(btn.dataset.workoutId);
                        savedModal.classList.add('hidden');
                        document.body.style.overflow = 'auto';
                    });
                });
                
                container.querySelectorAll('.delete-workout-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm('Delete this workout?')) {
                            deleteWorkout(btn.dataset.workoutId);
                            openSavedModal();
                        }
                    });
                });
            }
            
            savedModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function loadWorkout(workoutId) {
            const workout = appState.savedWorkouts.find(w => w.id === workoutId);
            if (workout) {
                appState.currentWorkoutId = workout.id;
                appState.currentWorkout = workout;
                multiDayWorkoutData = workout.workout;
                
                currentWorkoutNameEl.textContent = workout.name;
                if (workout.progressionNotes) {
                    progressionTextEl.textContent = workout.progressionNotes;
                    progressionNotesSection.classList.remove('hidden');
                }
                
                createDayNavigation();
                renderDay(0);
                saveState();
            }
        }

        function deleteWorkout(workoutId) {
            appState.savedWorkouts = appState.savedWorkouts.filter(w => w.id !== workoutId);
            if (appState.currentWorkoutId === workoutId && appState.savedWorkouts.length > 0) {
                loadWorkout(appState.savedWorkouts[0].id);
            }
            saveState();
        }

        function showToast(message) {
            const existing = document.getElementById('error-toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.id = 'error-toast';
            toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-red-600 text-white px-6 py-3 rounded-xl font-medium text-sm shadow-xl fade-in max-w-sm text-center';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
        }

        // ============================================
        // WORKOUT GENERATION
        // ============================================
        async function handleGenerate() {
            const generateBtn = document.getElementById('generate-with-settings');
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<div class="loading-spinner mx-auto"></div>';

            const settings = {
                focusArea: document.getElementById('focus-area').value,
                maxDuration: parseInt(document.getElementById('max-duration').value),
                equipmentPref: document.getElementById('equipment-pref').value,
                intensityTechnique: document.getElementById('intensity-technique').value
            };

            // The next workout is one week past the current workout. On a
            // blank slate (no current workout) the first workout is Week 1.
            const targetWeek = appState.currentWorkout && appState.currentWorkout.weekNumber
                ? appState.currentWorkout.weekNumber + 1
                : 1;

            const workoutName = document.getElementById('workout-name').value || `Week ${targetWeek} - ${new Date().toLocaleDateString()}`;

            let newWorkout;

            if (!WORKOUT_API_URL) {
                // No proxy configured — use local generator (first-run / offline fallback)
                await new Promise(resolve => setTimeout(resolve, 400));
                newWorkout = generateWeeklyWorkout(workoutName, settings);
            } else {
                // Trim payload: last 60 days of logs (max 30), last 12 entries per exercise
                const sixtyDaysAgo = new Date(Date.now() - 60 * 24 * 60 * 60 * 1000).toISOString();
                const recentLogs = appState.workoutLogs
                    .filter(l => l.date >= sixtyDaysAgo)
                    .slice(-30);

                const exerciseProgress = {};
                for (const [name, history] of Object.entries(appState.exerciseProgress)) {
                    exerciseProgress[name] = history.slice(-12);
                }

                const payload = {
                    weekNumber: targetWeek,
                    settings,
                    exerciseDatabase: ExerciseDatabase,
                    recentLogs,
                    exerciseProgress
                };

                try {
                    const resp = await fetch(WORKOUT_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.error || `Server error ${resp.status}`);
                    }

                    newWorkout = await resp.json();
                    // The name you type always wins. If you leave it blank, keep the
                    // coach's auto-generated name (falling back to a default if absent).
                    const typedName = document.getElementById('workout-name').value.trim();
                    if (typedName) {
                        newWorkout.name = typedName;
                    } else if (!newWorkout.name) {
                        newWorkout.name = workoutName;
                    }
                } catch (err) {
                    showToast("Couldn't reach coach — check connection and try again.");
                    generateBtn.disabled = false;
                    generateBtn.textContent = 'Generate New Workout';
                    return;
                }
            }

            // Stamp the workout with its week so the dashboard counter and
            // future generations always have an accurate reference point.
            newWorkout.weekNumber = targetWeek;

            appState.savedWorkouts.push(newWorkout);
            appState.currentWorkoutId = newWorkout.id;
            appState.currentWorkout = newWorkout;
            appState.settings = settings;
            appState.weekNumber = targetWeek;

            multiDayWorkoutData = newWorkout.workout;
            currentWorkoutNameEl.textContent = newWorkout.name;

            if (newWorkout.progressionNotes) {
                progressionTextEl.textContent = newWorkout.progressionNotes;
                progressionNotesSection.classList.remove('hidden');
            }

            createDayNavigation();
            renderDay(0);
            updateStats();
            saveState();

            generateBtn.disabled = false;
            generateBtn.textContent = 'Generate New Workout';
            document.getElementById('workout-name').value = '';

            settingsModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Clears all saved workouts, logs, and progress so the coach starts fresh.
        function resetAllData() {
            const ok = confirm(
                'Reset all data?\n\n' +
                'This permanently deletes every saved workout, logged session, and ' +
                'progress record. Your coach will start from a blank slate. ' +
                'This cannot be undone.'
            );
            if (!ok) return;
            localStorage.removeItem('hypertrophyCoachState_v2');
            location.reload();
        }

        // Renders the dashboard's blank-slate view before any workout exists.
        function showEmptyState() {
            currentWorkoutNameEl.textContent = 'No workout yet';
            workoutDayTitleEl.textContent = '';
            document.getElementById('workout-day-details').textContent = '';
            dayNavigationContainer.innerHTML = '';
            progressionNotesSection.classList.add('hidden');
            workoutContainer.innerHTML =
                '<div class="card card-static p-8 text-center">' +
                    '<h3 class="text-lg font-bold text-white mb-2">Ready to start</h3>' +
                    '<p class="text-neutral-400 text-sm mb-5">You\'re on a blank slate. Generate your first workout and the coach will build Week 1 around your goals.</p>' +
                    '<button id="empty-generate-btn" class="btn-primary text-white font-semibold py-2.5 px-5 rounded-lg text-sm">Generate Week 1</button>' +
                '</div>';
            document.getElementById('empty-generate-btn').addEventListener('click', () => {
                settingsModal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            });
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        closeTimerBtn.addEventListener('click', closeTimer);
        
        document.getElementById('settings-btn').addEventListener('click', () => {
            settingsModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        });
        
        document.getElementById('close-settings-btn').addEventListener('click', () => {
            settingsModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        });
        
        document.getElementById('generate-with-settings').addEventListener('click', handleGenerate);
        document.getElementById('reset-data-btn').addEventListener('click', resetAllData);

        document.getElementById('log-workout-btn').addEventListener('click', openLogModal);
        document.getElementById('close-log-btn').addEventListener('click', closeLogModal);
        document.getElementById('cancel-log-btn').addEventListener('click', closeLogModal);
        document.getElementById('save-log-btn').addEventListener('click', saveWorkoutLog);
        
        document.getElementById('progress-btn').addEventListener('click', openProgressModal);
        document.getElementById('close-progress-btn').addEventListener('click', () => {
            progressModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        });
        
        document.getElementById('saved-btn').addEventListener('click', openSavedModal);
        document.getElementById('close-saved-btn').addEventListener('click', () => {
            savedModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            
            if (appState.currentWorkout && appState.currentWorkout.workout) {
                multiDayWorkoutData = appState.currentWorkout.workout;
                currentWorkoutNameEl.textContent = appState.currentWorkout.name || 'Current Workout';
                if (appState.currentWorkout.progressionNotes) {
                    progressionTextEl.textContent = appState.currentWorkout.progressionNotes;
                    progressionNotesSection.classList.remove('hidden');
                }
                createDayNavigation();
                renderDay(0);
                updateStats();
            } else if (appState.savedWorkouts.length > 0) {
                loadWorkout(appState.savedWorkouts[appState.savedWorkouts.length - 1].id);
                updateStats();
            } else {
                // Blank slate — no workouts yet. Show an empty state that
                // invites the user to generate their first workout (Week 1).
                showEmptyState();
                updateStats();
            }
        });
    </script>
